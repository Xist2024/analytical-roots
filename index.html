<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Math Formulas</title>
    <style>
        html, body {
            background-color: white;
            margin: 0;
            padding: 0;
            text-align: left;
            font-family: "Times New Roman", Times, serif;
        }
        body {
            padding: 0 50px 100px 50px;
            display: block;
            min-width: max-content;
        }
        #nav-ui {
            position: sticky;
            top: 0;
            left: 0;
            background: white;
            padding: 25px 0;
            z-index: 1000;
            width: 100%;
        }
        .nav-btn {
            background: none;
            border: 1px solid #ccc;
            padding: 10px 20px;
            margin-right: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.2s;
        }
        .nav-btn.active {
            background: #000;
            color: #fff;
            border-color: #000;
        }
        .section {
            display: none;
            margin-top: 50px;
        }
        .section.active {
            display: block;
        }
        .formula-container {
            margin-bottom: 150px;
            display: block;
        }
        mjx-container[display="true"] {
            text-align: left !important;
            margin-left: 0 !important;
            margin-right: 0 !important;
        }
    </style>

    <script>
        window.MathJax = {
            startup: {
                typeset: false // 禁用全局自动渲染，改由 core.js 根据选项卡按需渲染
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>

    <div id="nav-ui">
        <button class="nav-btn active" onclick="showSection('algebra', this)">Equations & Roots</button>
        <button class="nav-btn" onclick="showSection('calculus', this)">Calculus & Differential</button>
        <button class="nav-btn" onclick="showSection('numbertheory', this)">Number Theory & Diophantine</button>
        <button class="nav-btn" onclick="showSection('series', this)">Series & Limits</button>
    </div>

    <div id="algebra" class="section active"></div>
    <div id="calculus" class="section"></div>
    <div id="numbertheory" class="section"></div>
    <div id="series" class="section"></div>

    <script src="core.js"></script>
</body>
</html>
